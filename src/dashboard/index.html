<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kakashi Bot — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0b14;
      --surface:   #13131f;
      --surface2:  #1a1a2b;
      --border:    #1e1e32;
      --accent:    #3dd68c;
      --accent-dim:#1e6b4a;
      --red:       #f97066;
      --yellow:    #fbbf24;
      --blue:      #60a5fa;
      --text:      #e2e2f0;
      --muted:     #5e607a;
      --mono:      'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      --sans:      'Inter', system-ui, -apple-system, sans-serif;
      --radius:    10px;
    }

    html { font-size: 14px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ---- Layout ---- */
    .page { max-width: 1400px; margin: 0 auto; padding: 0 24px 48px; }

    /* ---- Header ---- */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 0 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    header .meta { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .badge {
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge.paper  { border-color: var(--blue);   color: var(--blue); }
    .badge.live   { border-color: var(--red);    color: var(--red);  }

    /* Status pill */
    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .dot.online { background: var(--accent); animation: pulse 2s infinite; }
    .dot.stale  { background: var(--yellow); }
    .dot.offline{ background: var(--red); }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(61,214,140,.5); }
      50%       { box-shadow: 0 0 0 5px rgba(61,214,140,0); }
    }

    .last-updated { color: var(--muted); font-size: 0.75rem; font-family: var(--mono); }

    /* ---- KPI cards ---- */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }
    @media (max-width: 900px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .kpi-row { grid-template-columns: 1fr; } }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
    }
    .kpi-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .kpi-value {
      font-family: var(--mono);
      font-size: 1.85rem;
      font-weight: 600;
      line-height: 1;
      color: var(--text);
    }
    .kpi-value.positive { color: var(--accent); }
    .kpi-value.negative { color: var(--red); }
    .kpi-sub {
      margin-top: 6px;
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* ---- Two-column grid ---- */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 960px) { .grid-2 { grid-template-columns: 1fr; } }

    /* ---- Panel (card container) ---- */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .panel-count {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* ---- Tables ---- */
    .tbl-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    th {
      padding: 9px 14px;
      text-align: left;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .mono { font-family: var(--mono); }
    .green { color: var(--accent); }
    .red   { color: var(--red); }
    .dim   { color: var(--muted); }
    .right { text-align: right; }

    /* Outcome chip */
    .chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .chip.yes { background: rgba(61,214,140,.12); color: var(--accent); }
    .chip.no  { background: rgba(249,112,102,.12); color: var(--red); }
    .chip.other { background: rgba(96,165,250,.12); color: var(--blue); }

    /* Copied badge */
    .copied { color: var(--accent); font-size: 0.7rem; font-family: var(--mono); }
    .not-copied { color: var(--muted); font-size: 0.7rem; font-family: var(--mono); }

    /* Empty state */
    .empty {
      padding: 36px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
    }

    /* ---- Log panel ---- */
    .log-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .log-body {
      background: #090910;
      font-family: var(--mono);
      font-size: 0.72rem;
      line-height: 1.6;
      height: 340px;
      overflow-y: auto;
      padding: 14px 16px;
    }
    .log-line { white-space: pre-wrap; word-break: break-all; }
    .log-line.info    { color: #a0aec0; }
    .log-line.warn    { color: var(--yellow); }
    .log-line.error   { color: var(--red); }
    .log-line.success { color: var(--accent); }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ---- Refresh indicator ---- */
    #refresh-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="refresh-bar"></div>

  <div class="page">

    <!-- Header -->
    <header>
      <div class="logo">Kakashi<span>Bot</span></div>
      <div id="mode-badge" class="badge">—</div>
      <div class="meta">
        <div class="status-pill">
          <div id="status-dot" class="dot"></div>
          <span id="status-text">—</span>
        </div>
        <span id="last-updated" class="last-updated">—</span>
      </div>
    </header>

    <!-- KPI Cards -->
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">Total Trades</div>
        <div id="kpi-trades" class="kpi-value">—</div>
        <div id="kpi-wl" class="kpi-sub">—</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Win Rate</div>
        <div id="kpi-wr" class="kpi-value">—</div>
        <div id="kpi-wr-sub" class="kpi-sub">—</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Avg P&amp;L / Trade</div>
        <div id="kpi-pnl" class="kpi-value">—</div>
        <div id="kpi-pnl-sub" class="kpi-sub">—</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Active Signals</div>
        <div id="kpi-signals" class="kpi-value">—</div>
        <div id="kpi-wallets" class="kpi-sub">—</div>
      </div>
    </div>

    <!-- Positions + Wallets -->
    <div class="grid-2">

      <!-- Active Positions -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Active Positions</span>
          <span id="pos-count" class="panel-count">—</span>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Market</th>
                <th>Outcome</th>
                <th class="right">Consensus</th>
                <th class="right">Entry</th>
                <th class="right">P&amp;L</th>
                <th>Copied</th>
              </tr>
            </thead>
            <tbody id="positions-body">
              <tr><td colspan="6" class="empty">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Wallet Leaderboard -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Wallet Leaderboard</span>
          <span id="wallet-count" class="panel-count">—</span>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Wallet</th>
                <th class="right">W / L</th>
                <th class="right">Win Rate</th>
                <th class="right">Portfolio</th>
                <th class="right">PnL (USDC)</th>
              </tr>
            </thead>
            <tbody id="wallets-body">
              <tr><td colspan="5" class="empty">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Live Log -->
    <div class="log-panel">
      <div class="panel-header">
        <span class="panel-title">Live Log</span>
        <span id="log-count" class="panel-count">—</span>
      </div>
      <div id="log-body" class="log-body">
        <span class="log-line dim">Loading…</span>
      </div>
    </div>

  </div><!-- /page -->

<script>
  const REFRESH_INTERVAL = 15_000; // ms

  // ---- Utilities ----

  function fmt(n, decimals = 1) {
    if (n == null || isNaN(n)) return '—';
    return Number(n).toFixed(decimals);
  }

  function pnlClass(v) {
    if (v == null) return 'dim';
    return v > 0 ? 'green' : v < 0 ? 'red' : 'dim';
  }

  function outcomeChip(outcome) {
    const o = (outcome || '').toLowerCase();
    if (['yes', 'up'].includes(o)) return `<span class="chip yes">${outcome}</span>`;
    if (['no', 'down'].includes(o)) return `<span class="chip no">${outcome}</span>`;
    return `<span class="chip other">${outcome || '—'}</span>`;
  }

  function relTime(iso) {
    if (!iso) return '—';
    const delta = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (delta < 60) return `${delta}s ago`;
    if (delta < 3600) return `${Math.floor(delta / 60)}m ago`;
    if (delta < 86400) return `${Math.floor(delta / 3600)}h ago`;
    return `${Math.floor(delta / 86400)}d ago`;
  }

  function classifyLogLine(line) {
    const l = line.toLowerCase();
    if (l.includes('error') || l.includes('❌') || l.includes('crash')) return 'error';
    if (l.includes('warning') || l.includes('warn') || l.includes('⚠')) return 'warn';
    if (l.includes('✅') || l.includes('win') || l.includes('success') || l.includes('profit')) return 'success';
    return 'info';
  }

  // ---- Fetch helpers ----

  async function apiFetch(path) {
    const res = await fetch(path);
    if (!res.ok) throw new Error(`${path} → ${res.status}`);
    return res.json();
  }

  // ---- Render functions ----

  function renderStatus(data) {
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    const badge = document.getElementById('mode-badge');

    dot.className = 'dot ' + (data.status || 'offline');
    txt.textContent = data.status || 'offline';

    const mode = (data.mode || 'unknown').toLowerCase();
    badge.textContent = mode;
    badge.className = 'badge ' + (mode === 'live' ? 'live' : mode === 'paper' ? 'paper' : '');

    document.getElementById('last-updated').textContent =
      data.last_poll ? 'Last poll ' + relTime(data.last_poll) : 'No data';
  }

  function renderStats(stats) {
    const t = stats.totals || {};

    const trades = document.getElementById('kpi-trades');
    trades.textContent = t.trades ?? '0';

    document.getElementById('kpi-wl').textContent =
      `${t.wins ?? 0}W / ${t.losses ?? 0}L`;

    const wr = t.win_rate ?? 0;
    const wrEl = document.getElementById('kpi-wr');
    wrEl.textContent = fmt(wr, 1) + '%';
    wrEl.className = 'kpi-value ' + (wr >= 50 ? 'positive' : wr > 0 ? '' : '');

    document.getElementById('kpi-wr-sub').textContent =
      (stats.bots || []).length + ' bot(s) tracked';

    const pnl = t.avg_pnl_pct ?? 0;
    const pnlEl = document.getElementById('kpi-pnl');
    pnlEl.textContent = (pnl >= 0 ? '+' : '') + fmt(pnl, 2) + '%';
    pnlEl.className = 'kpi-value ' + (pnl > 0 ? 'positive' : pnl < 0 ? 'negative' : '');
    document.getElementById('kpi-pnl-sub').textContent = 'avg return per closed trade';
  }

  function renderStatusSignals(status) {
    document.getElementById('kpi-signals').textContent = status.active_signals ?? '—';
    document.getElementById('kpi-wallets').textContent =
      (status.wallets_tracked ? status.wallets_tracked + ' wallets tracked' : '—');
  }

  function renderPositions(positions) {
    const open = positions.filter(p => !p.closed);
    const closed = positions.filter(p => p.closed).slice(0, 5); // last 5 closed
    const rows = [...open, ...closed];

    document.getElementById('pos-count').textContent =
      `${open.length} open · ${positions.length} total`;

    const tbody = document.getElementById('positions-body');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">No signals yet</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(p => {
      const pnl = p.pnl_pct != null ? ((p.pnl_pct >= 0 ? '+' : '') + fmt(p.pnl_pct * 100, 2) + '%') : '—';
      const pnlCls = pnlClass(p.pnl_pct);
      const closedStyle = p.closed ? 'opacity:0.45;' : '';
      return `
        <tr style="${closedStyle}">
          <td title="${p.market}">${p.market.length > 35 ? p.market.slice(0, 34) + '…' : p.market}</td>
          <td>${outcomeChip(p.outcome)}</td>
          <td class="right mono">${fmt(p.consensus_pct, 0)}%</td>
          <td class="right mono">${fmt(p.entry_price * 100, 1)}¢</td>
          <td class="right mono ${pnlCls}">${pnl}</td>
          <td>${p.copied ? '<span class="copied">✓ copied</span>' : '<span class="not-copied">—</span>'}</td>
        </tr>`;
    }).join('');
  }

  function renderWallets(wallets) {
    document.getElementById('wallet-count').textContent = wallets.length + ' wallets';

    const tbody = document.getElementById('wallets-body');
    if (!wallets.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">No wallet data yet</td></tr>';
      return;
    }

    tbody.innerHTML = wallets.map(w => {
      const pnlCls = pnlClass(w.total_pnl);
      const pnlStr = (w.total_pnl >= 0 ? '+' : '') + fmt(w.total_pnl, 2);
      const portStr = w.portfolio_value > 0 ? '$' + fmt(w.portfolio_value, 2) : '<span class="dim">—</span>';
      return `
        <tr>
          <td title="${w.address}">
            <span class="mono" style="font-size:0.75rem">${w.label}</span>
            ${w.win_rate >= 60 && w.resolved >= 3 ? ' <span class="chip yes" style="font-size:0.6rem">sharp</span>' : ''}
          </td>
          <td class="right mono">${w.wins} / ${w.losses}</td>
          <td class="right mono">${fmt(w.win_rate, 1)}%</td>
          <td class="right mono">${portStr}</td>
          <td class="right mono ${pnlCls}">$${pnlStr}</td>
        </tr>`;
    }).join('');
  }

  function renderLogs(data) {
    const lines = data.lines || [];
    document.getElementById('log-count').textContent = lines.length + ' lines';

    const body = document.getElementById('log-body');
    body.innerHTML = lines.map(line => {
      const cls = classifyLogLine(line);
      const safe = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return `<div class="log-line ${cls}">${safe}</div>`;
    }).join('');

    // Auto-scroll to bottom
    body.scrollTop = body.scrollHeight;
  }

  // ---- Refresh bar animation ----

  let _barTimer = null;
  function animateBar() {
    const bar = document.getElementById('refresh-bar');
    bar.style.transition = 'none';
    bar.style.width = '0%';
    requestAnimationFrame(() => {
      bar.style.transition = `width ${REFRESH_INTERVAL}ms linear`;
      bar.style.width = '100%';
    });
  }

  // ---- Main refresh ----

  async function refresh() {
    try {
      const [status, stats, positions, wallets, logs] = await Promise.all([
        apiFetch('/api/status'),
        apiFetch('/api/stats'),
        apiFetch('/api/positions'),
        apiFetch('/api/wallets'),
        apiFetch('/api/logs?lines=80'),
      ]);

      renderStatus(status);
      renderStats(stats);
      renderStatusSignals(status);
      renderPositions(positions);
      renderWallets(wallets);
      renderLogs(logs);
    } catch (err) {
      console.error('Refresh failed:', err);
      document.getElementById('last-updated').textContent = 'Refresh failed — retrying…';
    }
  }

  // ---- Boot ----
  refresh();
  animateBar();
  setInterval(() => { refresh(); animateBar(); }, REFRESH_INTERVAL);
</script>
</body>
</html>
